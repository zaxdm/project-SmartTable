<header class="st-navbar" [class.scrolled]="scrolled">
  <div class="st-nav-inner">

    <a routerLink="/" class="st-logo-area">
      <div class="st-logo-box">
        <img 
          src="logo-smart.png" 
          alt="SmartTable logo" 
          class="st-logo-img"
          width="48"
          height="48"
        />
        <div class="logo-pulse"></div>
      </div>
      <span class="st-logo-text">Smart<span class="st-highlight">Table</span></span>
    </a>

    <nav class="st-nav-links" [class.open]="menuOpen">
<a *ngFor="let link of navLinks; let i = index"
  class="nav-link"
  [routerLink]="link.type === 'route' ? link.href : null"
  [attr.href]="link.type === 'scroll' ? '#' + link.href : null"
  (click)="onNavClick($event, link)"
  [style.animation-delay]="i * 60 + 'ms'">
  {{ link.label }}
</a>
    </nav>

    <div class="st-nav-right">
      <a href="#contacto" class="st-cta-btn">
        <span>Cotizar ahora</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
      <button class="hamburger" [class.active]="menuOpen" (click)="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>
</header>
